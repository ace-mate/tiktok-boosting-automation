name: TikTok Spend Guard

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      campaign_name_contains:
        description: Case-insensitive campaign-name filter
        required: false
        default: Views
        type: string
      spend_limit_eur:
        description: Disable campaigns with spend >= this EUR threshold
        required: false
        default: "10"
        type: string

permissions:
  contents: read
  actions: read

env:
  TIKTOK_BASE_URL: https://business-api.tiktok.com/open_api/v1.3
  MONITOR_ARTIFACT_NAME: tiktok-monitor-state
  START_AFTER_HOURS: "0"
  STOP_AFTER_HOURS: "23"

jobs:
  spend-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve state from latest boost artifact
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_CAMPAIGN_FILTER: ${{ inputs.campaign_name_contains }}
          INPUT_SPEND_LIMIT: ${{ inputs.spend_limit_eur }}
        run: |
          set -euo pipefail

          if ! gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${MONITOR_ARTIFACT_NAME}&per_page=100" > /tmp/guard-artifacts.json; then
            echo "action=none" >> "$GITHUB_OUTPUT"
            echo "No monitor artifact list available."
            exit 0
          fi

          artifact_id="$(python - <<'PY'
          import json

          try:
              with open("/tmp/guard-artifacts.json", "r", encoding="utf-8") as fh:
                  payload = json.load(fh)
          except Exception:
              print("")
              raise SystemExit(0)

          artifacts = payload.get("artifacts") or []
          artifacts = [a for a in artifacts if isinstance(a, dict) and not a.get("expired")]
          artifacts.sort(key=lambda a: str(a.get("created_at") or ""), reverse=True)
          print(str(artifacts[0].get("id") or "").strip() if artifacts else "")
          PY
          )"

          if [ -z "${artifact_id}" ]; then
            echo "action=none" >> "$GITHUB_OUTPUT"
            echo "No monitor state artifact found."
            exit 0
          fi

          if ! gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > /tmp/guard-monitor.zip; then
            echo "action=none" >> "$GITHUB_OUTPUT"
            echo "Unable to download monitor artifact zip."
            exit 0
          fi

          python - <<'PY'
          import datetime as dt
          import json
          import os
          import zipfile

          def parse_float(raw, default):
              try:
                  return float(str(raw).strip())
              except Exception:
                  return float(default)

          with zipfile.ZipFile("/tmp/guard-monitor.zip", "r") as zf:
              names = zf.namelist()
              target = "monitor_state.json"
              if target not in names:
                  if len(names) == 1:
                      target = names[0]
                  else:
                      with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
                          out.write("action=none\n")
                      print(f"Invalid monitor artifact contents: {names}")
                      raise SystemExit(0)
              state = json.loads(zf.read(target).decode("utf-8"))

          token = str(state.get("access_token") or "").strip()
          advertiser_id = str(state.get("advertiser_id") or "").strip()
          started_at_raw = str(state.get("started_at") or "").strip()
          if not token or not advertiser_id or not started_at_raw:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
                  out.write("action=none\n")
              print("Monitor state missing required fields.")
              raise SystemExit(0)

          started_at = dt.datetime.fromisoformat(started_at_raw.replace("Z", "+00:00"))
          if started_at.tzinfo is None:
              started_at = started_at.replace(tzinfo=dt.timezone.utc)

          now = dt.datetime.now(dt.timezone.utc)
          age_hours = (now - started_at).total_seconds() / 3600.0
          start_after = parse_float(os.environ.get("START_AFTER_HOURS"), 6)
          stop_after = parse_float(os.environ.get("STOP_AFTER_HOURS"), 23)

          if age_hours < start_after:
              action = "wait"
          elif age_hours > stop_after:
              action = "expired"
          else:
              action = "check"

          input_filter = str(os.environ.get("INPUT_CAMPAIGN_FILTER") or "").strip()
          name_filter = input_filter if input_filter else "Views"

          input_spend_limit = str(os.environ.get("INPUT_SPEND_LIMIT") or "").strip()
          if input_spend_limit:
              spend_limit = parse_float(input_spend_limit, 10)
          else:
              spend_limit = parse_float(state.get("spend_limit_eur"), 10)
          if spend_limit <= 0:
              spend_limit = 10.0

          print(f"::add-mask::{token}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as envf:
              envf.write(f"GUARD_ACCESS_TOKEN={token}\n")
              envf.write(f"GUARD_ADVERTISER_ID={advertiser_id}\n")
              envf.write(f"GUARD_NAME_FILTER={name_filter}\n")
              envf.write(f"GUARD_SPEND_LIMIT_EUR={spend_limit}\n")
              envf.write(f"GUARD_STARTED_AT={started_at.isoformat()}\n")
              envf.write(f"GUARD_AGE_HOURS={age_hours:.3f}\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"action={action}\n")
              out.write(f"age_hours={age_hours:.3f}\n")
              out.write(f"name_filter={name_filter}\n")
              out.write(f"spend_limit={spend_limit}\n")

          print(
              f"Resolved guard state: action={action}, age={age_hours:.2f}h, "
              f"filter={name_filter}, spend_limit={spend_limit:.2f}"
          )
          PY

      - name: Guard not initialized
        if: steps.state.outputs.action == 'none'
        run: echo "No usable monitor state yet. Run TikTok Boost Manual first."

      - name: Waiting for +6h window
        if: steps.state.outputs.action == 'wait'
        run: echo "Skipping; monitor age is ${{ steps.state.outputs.age_hours }}h (< ${START_AFTER_HOURS}h)."

      - name: Token window expired (>23h)
        if: steps.state.outputs.action == 'expired'
        run: echo "Skipping; monitor age is ${{ steps.state.outputs.age_hours }}h (> ${STOP_AFTER_HOURS}h)."

      - name: Disable over-budget active Views campaigns
        id: guard
        if: steps.state.outputs.action == 'check'
        shell: bash
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.parse
          import urllib.request

          base_url = os.environ["TIKTOK_BASE_URL"].rstrip("/")
          access_token = str(os.environ["GUARD_ACCESS_TOKEN"]).strip()
          advertiser_id = str(os.environ["GUARD_ADVERTISER_ID"]).strip()
          name_filter = str(os.environ["GUARD_NAME_FILTER"]).strip().lower()
          spend_limit = float(str(os.environ["GUARD_SPEND_LIMIT_EUR"]).strip())

          def api_get(path, params):
              url = f"{base_url}{path}?{urllib.parse.urlencode(params)}"
              req = urllib.request.Request(
                  url=url,
                  method="GET",
                  headers={
                      "Access-Token": access_token,
                      "Authorization": f"Bearer {access_token}",
                      "Content-Type": "application/json",
                  },
              )
              body = json.loads(urllib.request.urlopen(req, timeout=30).read().decode("utf-8"))
              if body.get("code") not in (0, "0", None):
                  raise RuntimeError(f"GET {path} failed: code={body.get('code')} message={body.get('message')} body={body}")
              return body.get("data") or {}

          def api_post(path, payload):
              req = urllib.request.Request(
                  url=f"{base_url}{path}",
                  method="POST",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Access-Token": access_token,
                      "Authorization": f"Bearer {access_token}",
                      "Content-Type": "application/json",
                  },
              )
              body = json.loads(urllib.request.urlopen(req, timeout=30).read().decode("utf-8"))
              if body.get("code") not in (0, "0", None):
                  raise RuntimeError(f"POST {path} failed: code={body.get('code')} message={body.get('message')} body={body}")
              return body.get("data") or {}

          def extract_list(data):
              if isinstance(data, list):
                  return data
              if isinstance(data, dict):
                  for key in ("list", "campaigns", "results", "rows", "data"):
                      value = data.get(key)
                      if isinstance(value, list):
                          return value
              return []

          def to_float(value):
              try:
                  return float(value)
              except Exception:
                  return 0.0

          # Campaign scan
          campaigns = []
          page = 1
          while True:
              data = api_get(
                  "/campaign/get/",
                  {
                      "advertiser_id": advertiser_id,
                      "page": str(page),
                      "page_size": "100",
                  },
              )
              items = extract_list(data)
              if not items:
                  break
              campaigns.extend(items)
              if len(items) < 100:
                  break
              page += 1

          def is_active(c):
              op = str(c.get("operation_status") or "").upper()
              sec = str(c.get("secondary_status") or "").upper()
              if op == "ENABLE":
                  return True
              return ("ENABLE" in sec) and ("DISABLE" not in sec)

          candidates = []
          for c in campaigns:
              cid = str(c.get("campaign_id") or c.get("id") or "").strip()
              name = str(c.get("campaign_name") or c.get("name") or "").strip()
              if not cid or not name:
                  continue
              if name_filter not in name.lower():
                  continue
              if not is_active(c):
                  continue
              candidates.append({"campaign_id": cid, "campaign_name": name})

          spend_map = {c["campaign_id"]: 0.0 for c in candidates}
          today = dt.datetime.now(dt.timezone.utc).date().isoformat()
          page = 1
          while True:
              data = api_get(
                  "/report/integrated/get/",
                  {
                      "advertiser_id": advertiser_id,
                      "report_type": "BASIC",
                      "data_level": "AUCTION_CAMPAIGN",
                      "dimensions": json.dumps(["campaign_id"], separators=(",", ":")),
                      "metrics": json.dumps(["spend"], separators=(",", ":")),
                      "start_date": today,
                      "end_date": today,
                      "page": str(page),
                      "page_size": "200",
                  },
              )
              rows = extract_list(data)
              if not rows:
                  break
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  cid = str(row.get("campaign_id") or "").strip()
                  if not cid or cid not in spend_map:
                      continue
                  spend = to_float(row.get("spend"))
                  metrics = row.get("metrics")
                  if spend <= 0 and isinstance(metrics, dict):
                      spend = to_float(metrics.get("spend"))
                  spend_map[cid] = max(spend_map.get(cid, 0.0), spend)
              if len(rows) < 200:
                  break
              page += 1

          disable_items = []
          for c in candidates:
              spend = spend_map.get(c["campaign_id"], 0.0)
              if spend >= spend_limit:
                  disable_items.append(
                      {
                          "campaign_id": c["campaign_id"],
                          "campaign_name": c["campaign_name"],
                          "spend_eur": round(spend, 4),
                      }
                  )

          if disable_items:
              api_post(
                  "/campaign/status/update/",
                  {
                      "advertiser_id": advertiser_id,
                      "campaign_ids": [x["campaign_id"] for x in disable_items],
                      "operation_status": "DISABLE",
                      "allow_partial_success": True,
                  },
              )

          result = {
              "checked_active_views_campaigns": len(candidates),
              "disabled_campaigns_count": len(disable_items),
              "disabled_campaigns": disable_items,
              "name_filter": name_filter,
              "spend_limit_eur": spend_limit,
              "date_utc": today,
          }
          with open("guard_result.json", "w", encoding="utf-8") as fh:
              json.dump(result, fh)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"checked_count={len(candidates)}\n")
              out.write(f"disabled_count={len(disable_items)}\n")

          print(json.dumps(result, indent=2))
          PY

      - name: Send Slack summary
        if: success() && steps.state.outputs.action == 'check'
        continue-on-error: true
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0A49B277UK
          CHECKED_COUNT: ${{ steps.guard.outputs.checked_count }}
          DISABLED_COUNT: ${{ steps.guard.outputs.disabled_count }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ.get("SLACK_BOT_TOKEN", "").strip()
          if not token:
              print("SLACK_BOT_TOKEN not set; skipping Slack summary.")
              raise SystemExit(0)

          try:
              with open("guard_result.json", "r", encoding="utf-8") as fh:
                  result = json.load(fh)
          except Exception:
              result = {}

          disabled = result.get("disabled_campaigns") or []
          if disabled:
              disabled_lines = "\n".join(
                  f"- {item.get('campaign_name')} ({item.get('campaign_id')}): €{item.get('spend_eur')}"
                  for item in disabled
              )
          else:
              disabled_lines = "- none"

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""

          text = (
              "TikTok Spend Guard Completed\n"
              f"Checked active Views campaigns: {os.environ.get('CHECKED_COUNT', '0')}\n"
              f"Disabled campaigns: {os.environ.get('DISABLED_COUNT', '0')}\n"
              f"Limit (EUR): {result.get('spend_limit_eur', '10')}\n"
              f"Disabled list:\n{disabled_lines}\n"
              f"Run: {run_url}"
          )

          req = urllib.request.Request(
              url="https://slack.com/api/chat.postMessage",
              method="POST",
              data=json.dumps(
                  {
                      "channel": os.environ.get("SLACK_CHANNEL_ID", "C0A49B277UK"),
                      "text": text,
                      "unfurl_links": False,
                      "unfurl_media": False,
                  }
              ).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8",
              },
          )

          try:
              raw = urllib.request.urlopen(req, timeout=20).read().decode("utf-8")
          except urllib.error.HTTPError as exc:
              print(f"Slack summary HTTP error {exc.code}: {exc.read().decode('utf-8', errors='replace')}")
              raise SystemExit(0)
          except urllib.error.URLError as exc:
              print(f"Slack summary network error: {exc}")
              raise SystemExit(0)

          parsed = json.loads(raw)
          if not parsed.get("ok"):
              print(f"Slack API summary error: {parsed}")
          else:
              print("Slack summary sent.")
          PY

      - name: Send Slack error notification
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0A49B277UK
          OUTCOME_STATE: ${{ steps.state.outcome }}
          OUTCOME_GUARD: ${{ steps.guard.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ.get("SLACK_BOT_TOKEN", "").strip()
          if not token:
              print("SLACK_BOT_TOKEN not set; skipping Slack failure notification.")
              raise SystemExit(0)

          outcomes = [
              ("Resolve state from latest boost artifact", os.environ.get("OUTCOME_STATE", "")),
              ("Disable over-budget active Views campaigns", os.environ.get("OUTCOME_GUARD", "")),
          ]
          failed_step = next((name for name, outcome in outcomes if outcome == "failure"), "Unknown")

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          actor = os.environ.get("GITHUB_ACTOR", "")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""

          text = (
              ":x: TikTok Spend Guard failed\n"
              f"Failed step: {failed_step}\n"
              f"Actor: {actor}\n"
              f"Run: {run_url}"
          )

          req = urllib.request.Request(
              url="https://slack.com/api/chat.postMessage",
              method="POST",
              data=json.dumps(
                  {
                      "channel": os.environ.get("SLACK_CHANNEL_ID", "C0A49B277UK"),
                      "text": text,
                      "unfurl_links": False,
                      "unfurl_media": False,
                  }
              ).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8",
              },
          )
          try:
              raw = urllib.request.urlopen(req, timeout=20).read().decode("utf-8")
          except urllib.error.HTTPError as exc:
              print(f"Slack failure HTTP error {exc.code}: {exc.read().decode('utf-8', errors='replace')}")
              raise SystemExit(0)
          except urllib.error.URLError as exc:
              print(f"Slack failure network error: {exc}")
              raise SystemExit(0)

          parsed = json.loads(raw)
          if not parsed.get("ok"):
              print(f"Slack API failure error: {parsed}")
          else:
              print("Slack failure notification sent.")
          PY
