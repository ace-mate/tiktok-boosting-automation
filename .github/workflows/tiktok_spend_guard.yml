name: TikTok Spend Guard

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  TIKTOK_BASE_URL: https://business-api.tiktok.com/open_api/v1.3
  MONITOR_ARTIFACT_NAME: tiktok-monitor-state

jobs:
  spend-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Load latest monitor state artifact
        id: state
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import datetime as dt
          import io
          import json
          import os
          import urllib.parse
          import urllib.request
          import zipfile

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          artifact_name = os.environ["MONITOR_ARTIFACT_NAME"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          list_url = (
              f"https://api.github.com/repos/{repo}/actions/artifacts"
              f"?name={urllib.parse.quote(artifact_name)}&per_page=100"
          )
          req = urllib.request.Request(list_url, method="GET", headers=headers)
          payload = json.loads(urllib.request.urlopen(req, timeout=30).read().decode("utf-8"))

          artifacts = payload.get("artifacts") or []
          artifacts = [a for a in artifacts if isinstance(a, dict) and not a.get("expired")]

          if not artifacts:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
                  out.write("action=none\n")
              print("No monitor state artifact found.")
              raise SystemExit(0)

          artifacts.sort(key=lambda a: str(a.get("created_at") or ""), reverse=True)
          artifact = artifacts[0]
          artifact_id = str(artifact.get("id"))
          archive_url = str(artifact.get("archive_download_url") or "").strip()
          if not archive_url:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
                  out.write("action=none\n")
              print("Latest monitor artifact has no archive_download_url.")
              raise SystemExit(0)

          req = urllib.request.Request(archive_url, method="GET", headers=headers)
          zip_bytes = urllib.request.urlopen(req, timeout=30).read()

          with zipfile.ZipFile(io.BytesIO(zip_bytes)) as zf:
              names = zf.namelist()
              target = "monitor_state.json"
              if target not in names:
                  if len(names) == 1:
                      target = names[0]
                  else:
                      raise RuntimeError(f"monitor_state.json not found in artifact files: {names}")
              state = json.loads(zf.read(target).decode("utf-8"))

          campaign_id = str(state.get("campaign_id") or "").strip()
          advertiser_id = str(state.get("advertiser_id") or "").strip()
          access_token = str(state.get("access_token") or "").strip()
          started_at_raw = str(state.get("started_at") or "").strip()
          spend_limit_raw = str(state.get("spend_limit_eur") or "10").strip()

          if not campaign_id or not advertiser_id or not access_token or not started_at_raw:
              raise RuntimeError(f"Invalid monitor state payload: {state}")

          started_at = dt.datetime.fromisoformat(started_at_raw.replace("Z", "+00:00"))
          if started_at.tzinfo is None:
              started_at = started_at.replace(tzinfo=dt.timezone.utc)

          now = dt.datetime.now(dt.timezone.utc)
          age_hours = (now - started_at).total_seconds() / 3600.0

          if age_hours < 6:
              action = "wait"
          elif age_hours > 30:
              action = "stale"
          else:
              action = "check"

          try:
              spend_limit_eur = float(spend_limit_raw)
          except ValueError:
              spend_limit_eur = 10.0

          print(f"::add-mask::{access_token}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as envf:
              envf.write(f"MONITOR_CAMPAIGN_ID={campaign_id}\n")
              envf.write(f"MONITOR_ADVERTISER_ID={advertiser_id}\n")
              envf.write(f"MONITOR_ACCESS_TOKEN={access_token}\n")
              envf.write(f"MONITOR_STARTED_AT={started_at.isoformat()}\n")
              envf.write(f"MONITOR_SPEND_LIMIT_EUR={spend_limit_eur}\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"action={action}\n")
              out.write(f"age_hours={age_hours:.3f}\n")
              out.write(f"artifact_id={artifact_id}\n")

          print(
              f"Loaded monitor artifact id={artifact_id} for campaign {campaign_id}; "
              f"age={age_hours:.2f}h; action={action}"
          )
          PY

      - name: Nothing to check
        if: steps.state.outputs.action == 'none'
        run: echo "No active monitor state artifact."

      - name: Warm-up period not reached
        if: steps.state.outputs.action == 'wait'
        run: echo "Skipping spend check; less than 6 hours since campaign launch (age=${{ steps.state.outputs.age_hours }}h)."

      - name: Monitor state stale
        if: steps.state.outputs.action == 'stale'
        run: echo "Latest monitor artifact is stale (>30h). Skipping."

      - name: Fetch campaign spend
        id: spend
        if: steps.state.outputs.action == 'check'
        shell: bash
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.parse
          import urllib.request

          def _to_float(value):
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return 0.0

          def _row_spend(row):
              if not isinstance(row, dict):
                  return 0.0
              direct = _to_float(row.get("spend"))
              if direct > 0:
                  return direct
              metrics = row.get("metrics")
              if isinstance(metrics, dict):
                  metric_spend = _to_float(metrics.get("spend"))
                  if metric_spend > 0:
                      return metric_spend
              return 0.0

          base_url = os.environ["TIKTOK_BASE_URL"].rstrip("/")
          advertiser_id = os.environ["MONITOR_ADVERTISER_ID"]
          campaign_id = os.environ["MONITOR_CAMPAIGN_ID"]
          access_token = os.environ["MONITOR_ACCESS_TOKEN"]
          spend_limit = _to_float(os.environ.get("MONITOR_SPEND_LIMIT_EUR", "10"))

          now = dt.datetime.now(dt.timezone.utc).date()
          start_date = dt.datetime.fromisoformat(os.environ["MONITOR_STARTED_AT"].replace("Z", "+00:00")).date()

          params = {
              "advertiser_id": advertiser_id,
              "report_type": "BASIC",
              "data_level": "AUCTION_CAMPAIGN",
              "dimensions": json.dumps(["campaign_id"]),
              "metrics": json.dumps(["spend"]),
              "start_date": start_date.isoformat(),
              "end_date": now.isoformat(),
              "page": "1",
              "page_size": "100",
              "filtering": json.dumps([
                  {
                      "field_name": "campaign_id",
                      "filter_type": "IN",
                      "filter_value": campaign_id,
                  }
              ]),
          }

          url = f"{base_url}/report/integrated/get/?{urllib.parse.urlencode(params)}"
          req = urllib.request.Request(
              url,
              method="GET",
              headers={
                  "Access-Token": access_token,
                  "Authorization": f"Bearer {access_token}",
                  "Content-Type": "application/json",
              },
          )

          raw = urllib.request.urlopen(req, timeout=30).read().decode("utf-8")
          body = json.loads(raw)

          if body.get("code") not in (0, "0", None):
              raise RuntimeError(f"TikTok report error: code={body.get('code')} message={body.get('message')} body={body}")

          data = body.get("data")
          if isinstance(data, dict):
              rows = data.get("list") or data.get("rows") or []
          elif isinstance(data, list):
              rows = data
          else:
              rows = []

          spend = 0.0
          for row in rows:
              if isinstance(row, dict):
                  row_campaign_id = str(row.get("campaign_id") or "").strip()
                  if row_campaign_id and row_campaign_id != campaign_id:
                      continue
              spend += _row_spend(row)

          should_stop = spend >= spend_limit

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"spend_eur={spend:.4f}\n")
              out.write(f"should_stop={'true' if should_stop else 'false'}\n")

          print(f"Campaign spend={spend:.4f} EUR, limit={spend_limit:.4f} EUR, should_stop={should_stop}")
          PY

      - name: Disable campaign at spend threshold
        id: disable_campaign
        if: steps.state.outputs.action == 'check' && steps.spend.outputs.should_stop == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          base_url = os.environ["TIKTOK_BASE_URL"].rstrip("/")
          advertiser_id = os.environ["MONITOR_ADVERTISER_ID"]
          campaign_id = os.environ["MONITOR_CAMPAIGN_ID"]
          access_token = os.environ["MONITOR_ACCESS_TOKEN"]

          payload = {
              "advertiser_id": advertiser_id,
              "campaign_ids": [campaign_id],
              "operation_status": "DISABLE",
          }

          req = urllib.request.Request(
              url=f"{base_url}/campaign/status/update/",
              method="POST",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Access-Token": access_token,
                  "Authorization": f"Bearer {access_token}",
                  "Content-Type": "application/json",
              },
          )

          raw = urllib.request.urlopen(req, timeout=30).read().decode("utf-8")
          body = json.loads(raw)
          if body.get("code") not in (0, "0", None):
              raise RuntimeError(f"Disable failed: {body}")

          print(f"Campaign {campaign_id} disabled after crossing spend limit.")
          PY

      - name: Send Slack error notification
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0A49B277UK
          OUTCOME_STATE: ${{ steps.state.outcome }}
          OUTCOME_SPEND: ${{ steps.spend.outcome }}
          OUTCOME_DISABLE: ${{ steps.disable_campaign.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ.get("SLACK_BOT_TOKEN", "").strip()
          if not token:
              print("SLACK_BOT_TOKEN not set; skipping failure Slack notification.")
              raise SystemExit(0)

          outcomes = [
              ("Load latest monitor state artifact", os.environ.get("OUTCOME_STATE", "")),
              ("Fetch campaign spend", os.environ.get("OUTCOME_SPEND", "")),
              ("Disable campaign at spend threshold", os.environ.get("OUTCOME_DISABLE", "")),
          ]
          failed_step = next((name for name, outcome in outcomes if outcome == "failure"), "Unknown")

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          actor = os.environ.get("GITHUB_ACTOR", "")
          workflow = os.environ.get("GITHUB_WORKFLOW", "TikTok Spend Guard")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""

          text = (
              f":x: {workflow} failed\n"
              f"Failed step: {failed_step}\n"
              f"Actor: {actor}\n"
              f"Run: {run_url}"
          )

          payload = {
              "channel": os.environ.get("SLACK_CHANNEL_ID", "C0A49B277UK"),
              "text": text,
              "unfurl_links": False,
              "unfurl_media": False,
          }
          req = urllib.request.Request(
              url="https://slack.com/api/chat.postMessage",
              method="POST",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8",
              },
          )
          try:
              raw = urllib.request.urlopen(req, timeout=20).read().decode("utf-8")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(f"Slack notification failed with HTTP {exc.code}: {body}")
              raise SystemExit(0)
          except urllib.error.URLError as exc:
              print(f"Slack notification network error: {exc}")
              raise SystemExit(0)

          result = json.loads(raw)
          if not result.get("ok"):
              print(f"Slack API returned error: {result}")
          else:
              print("Slack failure notification sent.")
          PY
