name: TikTok Spend Guard

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      campaign_name_contains:
        description: Case-insensitive campaign name filter
        required: false
        default: Views
        type: string
      spend_limit_eur:
        description: Disable campaigns with spend >= this EUR amount (today, UTC)
        required: false
        default: "10"
        type: string

permissions:
  contents: read
  actions: read

env:
  TIKTOK_BASE_URL: https://business-api.tiktok.com/open_api/v1.3
  TIKTOK_ADVERTISER_ID: "7441895227339718673"
  MONITOR_ARTIFACT_NAME: tiktok-monitor-state

jobs:
  spend-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Load latest monitor artifact token (fallback)
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TOKEN_FROM_SECRET: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${TOKEN_FROM_SECRET:-}" ]; then
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "TIKTOK_ACCESS_TOKEN secret is set; skipping artifact-token fetch."
            exit 0
          fi

          artifact_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${MONITOR_ARTIFACT_NAME}&per_page=100" | python - <<'PY'
          import json
          import sys

          payload = json.load(sys.stdin)
          artifacts = payload.get("artifacts") or []
          artifacts = [a for a in artifacts if isinstance(a, dict) and not a.get("expired")]
          artifacts.sort(key=lambda a: str(a.get("created_at") or ""), reverse=True)
          print(str(artifacts[0].get("id") or "").strip() if artifacts else "")
          PY
          )"

          if [ -z "${artifact_id}" ]; then
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "No monitor state artifact found."
            exit 0
          fi

          if ! gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > /tmp/tiktok-monitor-state.zip; then
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "Artifact zip fetch failed for id=${artifact_id}; continuing without artifact token."
            exit 0
          fi

          token_value="$(python - <<'PY'
          import json
          import zipfile

          path = "/tmp/tiktok-monitor-state.zip"
          token = ""
          with zipfile.ZipFile(path) as zf:
              names = zf.namelist()
              target = "monitor_state.json"
              if target not in names:
                  if len(names) == 1:
                      target = names[0]
                  else:
                      print("")
                      raise SystemExit(0)
              state = json.loads(zf.read(target).decode("utf-8"))
              token = str(state.get("access_token") or "").strip()
          print(token)
          PY
          )"

          echo "::add-mask::${token_value}"
          echo "token=${token_value}" >> "$GITHUB_OUTPUT"

      - name: Resolve guard context
        id: ctx
        shell: bash
        env:
          TOKEN_FROM_SECRET: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TOKEN_FROM_ARTIFACT: ${{ steps.state.outputs.token }}
          INPUT_NAME_FILTER: ${{ inputs.campaign_name_contains }}
          INPUT_SPEND_LIMIT: ${{ inputs.spend_limit_eur }}
        run: |
          python - <<'PY'
          import os
          import sys

          token = str(os.environ.get("TOKEN_FROM_SECRET") or "").strip()
          if token:
              token_source = "secret"
          else:
              token = str(os.environ.get("TOKEN_FROM_ARTIFACT") or "").strip()
              token_source = "artifact"

          if not token:
              print(
                  "::error::No TikTok token available for spend guard. "
                  "Set secret TIKTOK_ACCESS_TOKEN or run TikTok Boost Manual first to publish monitor artifact."
              )
              sys.exit(1)

          try:
              spend_limit = float(str(os.environ.get("INPUT_SPEND_LIMIT") or "10").strip())
          except ValueError:
              spend_limit = 10.0
          if spend_limit <= 0:
              spend_limit = 10.0

          name_filter = str(os.environ.get("INPUT_NAME_FILTER") or "Views").strip() or "Views"
          print(f"Resolved spend guard context: token_source={token_source}, name_filter={name_filter}, spend_limit={spend_limit:.2f}")
          print(f"::add-mask::{token}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as envf:
              envf.write(f"GUARD_ACCESS_TOKEN={token}\n")
              envf.write(f"GUARD_SPEND_LIMIT_EUR={spend_limit}\n")
              envf.write(f"GUARD_NAME_FILTER={name_filter}\n")
              envf.write(f"GUARD_TOKEN_SOURCE={token_source}\n")
          PY

      - name: Disable over-budget active Views campaigns
        id: guard
        shell: bash
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.parse
          import urllib.request

          base_url = os.environ["TIKTOK_BASE_URL"].rstrip("/")
          advertiser_id = str(os.environ["TIKTOK_ADVERTISER_ID"]).strip()
          access_token = str(os.environ["GUARD_ACCESS_TOKEN"]).strip()
          name_filter = str(os.environ.get("GUARD_NAME_FILTER") or "Views").strip().lower()
          spend_limit = float(str(os.environ.get("GUARD_SPEND_LIMIT_EUR") or "10"))

          def api_get(path, params):
              url = f"{base_url}{path}?{urllib.parse.urlencode(params)}"
              req = urllib.request.Request(
                  url=url,
                  method="GET",
                  headers={
                      "Access-Token": access_token,
                      "Authorization": f"Bearer {access_token}",
                      "Content-Type": "application/json",
                  },
              )
              body = json.loads(urllib.request.urlopen(req, timeout=30).read().decode("utf-8"))
              if body.get("code") not in (0, "0", None):
                  raise RuntimeError(f"GET {path} failed: code={body.get('code')} message={body.get('message')} body={body}")
              return body.get("data") or {}

          def api_post(path, payload):
              req = urllib.request.Request(
                  url=f"{base_url}{path}",
                  method="POST",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Access-Token": access_token,
                      "Authorization": f"Bearer {access_token}",
                      "Content-Type": "application/json",
                  },
              )
              body = json.loads(urllib.request.urlopen(req, timeout=30).read().decode("utf-8"))
              if body.get("code") not in (0, "0", None):
                  raise RuntimeError(f"POST {path} failed: code={body.get('code')} message={body.get('message')} body={body}")
              return body.get("data") or {}

          def extract_list(data):
              if isinstance(data, list):
                  return data
              if isinstance(data, dict):
                  for key in ("list", "campaigns", "data", "results", "rows"):
                      value = data.get(key)
                      if isinstance(value, list):
                          return value
              return []

          def to_float(value):
              try:
                  return float(value)
              except (TypeError, ValueError):
                  return 0.0

          # 1) Fetch campaigns with pagination.
          campaigns = []
          page = 1
          while True:
              data = api_get(
                  "/campaign/get/",
                  {
                      "advertiser_id": advertiser_id,
                      "page": page,
                      "page_size": 100,
                  },
              )
              items = extract_list(data)
              if not items:
                  break
              campaigns.extend(items)
              if len(items) < 100:
                  break
              page += 1

          def is_active(c):
              op = str(c.get("operation_status") or "").upper()
              sec = str(c.get("secondary_status") or "").upper()
              if op == "ENABLE":
                  return True
              return ("ENABLE" in sec) and ("DISABLE" not in sec)

          candidates = []
          for c in campaigns:
              name = str(c.get("campaign_name") or c.get("name") or "").strip()
              cid = str(c.get("campaign_id") or c.get("id") or "").strip()
              if not cid or not name:
                  continue
              if name_filter not in name.lower():
                  continue
              if not is_active(c):
                  continue
              candidates.append({"campaign_id": cid, "campaign_name": name})

          # 2) Reporting spend (today UTC).
          today = dt.datetime.now(dt.timezone.utc).date().isoformat()
          spend_map = {c["campaign_id"]: 0.0 for c in candidates}

          chunk_size = 50
          campaign_ids = [c["campaign_id"] for c in candidates]
          for i in range(0, len(campaign_ids), chunk_size):
              chunk = campaign_ids[i:i + chunk_size]
              data = api_get(
                  "/report/integrated/get/",
                  {
                      "advertiser_id": advertiser_id,
                      "report_type": "BASIC",
                      "data_level": "AUCTION_CAMPAIGN",
                      "dimensions": json.dumps(["campaign_id"], separators=(",", ":")),
                      "metrics": json.dumps(["spend"], separators=(",", ":")),
                      "start_date": today,
                      "end_date": today,
                      "page": "1",
                      "page_size": "200",
                      "filtering": json.dumps(
                          [
                              {
                                  "field_name": "campaign_id",
                                  "filter_type": "IN",
                                  "filter_value": chunk,
                              }
                          ],
                          separators=(",", ":"),
                      ),
                  },
              )
              rows = extract_list(data)
              for row in rows:
                  if not isinstance(row, dict):
                      continue
                  cid = str(row.get("campaign_id") or "").strip()
                  if not cid:
                      continue
                  spend = to_float(row.get("spend"))
                  metrics = row.get("metrics")
                  if spend <= 0 and isinstance(metrics, dict):
                      spend = to_float(metrics.get("spend"))
                  spend_map[cid] = max(spend_map.get(cid, 0.0), spend)

          disable_items = []
          for c in candidates:
              cid = c["campaign_id"]
              spend = spend_map.get(cid, 0.0)
              if spend >= spend_limit:
                  disable_items.append(
                      {
                          "campaign_id": cid,
                          "campaign_name": c["campaign_name"],
                          "spend_eur": round(spend, 4),
                      }
                  )

          if disable_items:
              api_post(
                  "/campaign/status/update/",
                  {
                      "advertiser_id": advertiser_id,
                      "campaign_ids": [x["campaign_id"] for x in disable_items],
                      "operation_status": "DISABLE",
                      "allow_partial_success": True,
                  },
              )

          result = {
              "name_filter": name_filter,
              "spend_limit_eur": spend_limit,
              "checked_active_views_campaigns": len(candidates),
              "disabled_campaigns_count": len(disable_items),
              "disabled_campaigns": disable_items,
              "token_source": os.environ.get("GUARD_TOKEN_SOURCE", "unknown"),
              "date_utc": today,
          }

          with open("guard_result.json", "w", encoding="utf-8") as fh:
              json.dump(result, fh)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"checked_count={len(candidates)}\n")
              out.write(f"disabled_count={len(disable_items)}\n")

          print(json.dumps(result, indent=2))
          PY

      - name: Send Slack summary
        if: success()
        continue-on-error: true
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0A49B277UK
          CHECKED_COUNT: ${{ steps.guard.outputs.checked_count }}
          DISABLED_COUNT: ${{ steps.guard.outputs.disabled_count }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ.get("SLACK_BOT_TOKEN", "").strip()
          if not token:
              print("SLACK_BOT_TOKEN not set; skipping Slack summary notification.")
              raise SystemExit(0)

          try:
              with open("guard_result.json", "r", encoding="utf-8") as fh:
                  result = json.load(fh)
          except Exception:
              result = {}

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""

          disabled = result.get("disabled_campaigns") or []
          if disabled:
              lines = "\n".join(
                  f"- {c.get('campaign_name')} ({c.get('campaign_id')}): €{c.get('spend_eur')}"
                  for c in disabled
              )
          else:
              lines = "- none"

          text = (
              "TikTok Spend Guard Completed\n"
              f"Checked active \"Views\" campaigns: {os.environ.get('CHECKED_COUNT', '0')}\n"
              f"Disabled over-budget campaigns: {os.environ.get('DISABLED_COUNT', '0')}\n"
              f"Limit (EUR, today UTC): {result.get('spend_limit_eur', '10')}\n"
              f"Disabled list:\n{lines}\n"
              f"Run: {run_url}"
          )

          payload = {
              "channel": os.environ.get("SLACK_CHANNEL_ID", "C0A49B277UK"),
              "text": text,
              "unfurl_links": False,
              "unfurl_media": False,
          }

          req = urllib.request.Request(
              url="https://slack.com/api/chat.postMessage",
              method="POST",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8",
              },
          )
          try:
              raw = urllib.request.urlopen(req, timeout=20).read().decode("utf-8")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(f"Slack summary failed with HTTP {exc.code}: {body}")
              raise SystemExit(0)
          except urllib.error.URLError as exc:
              print(f"Slack summary network error: {exc}")
              raise SystemExit(0)

          parsed = json.loads(raw)
          if not parsed.get("ok"):
              print(f"Slack API returned error for summary message: {parsed}")
          else:
              print("Slack summary notification sent.")
          PY

      - name: Send Slack error notification
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0A49B277UK
          OUTCOME_STATE: ${{ steps.state.outcome }}
          OUTCOME_CTX: ${{ steps.ctx.outcome }}
          OUTCOME_GUARD: ${{ steps.guard.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ.get("SLACK_BOT_TOKEN", "").strip()
          if not token:
              print("SLACK_BOT_TOKEN not set; skipping failure Slack notification.")
              raise SystemExit(0)

          outcomes = [
              ("Load latest monitor artifact token", os.environ.get("OUTCOME_STATE", "")),
              ("Resolve guard context", os.environ.get("OUTCOME_CTX", "")),
              ("Disable over-budget active Views campaigns", os.environ.get("OUTCOME_GUARD", "")),
          ]
          failed_step = next((name for name, outcome in outcomes if outcome == "failure"), "Unknown")

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          actor = os.environ.get("GITHUB_ACTOR", "")
          workflow = os.environ.get("GITHUB_WORKFLOW", "TikTok Spend Guard")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""

          text = (
              f":x: {workflow} failed\n"
              f"Failed step: {failed_step}\n"
              f"Actor: {actor}\n"
              f"Run: {run_url}"
          )

          payload = {
              "channel": os.environ.get("SLACK_CHANNEL_ID", "C0A49B277UK"),
              "text": text,
              "unfurl_links": False,
              "unfurl_media": False,
          }
          req = urllib.request.Request(
              url="https://slack.com/api/chat.postMessage",
              method="POST",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8",
              },
          )
          try:
              raw = urllib.request.urlopen(req, timeout=20).read().decode("utf-8")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(f"Slack failure-notification failed with HTTP {exc.code}: {body}")
              raise SystemExit(0)
          except urllib.error.URLError as exc:
              print(f"Slack failure-notification network error: {exc}")
              raise SystemExit(0)

          parsed = json.loads(raw)
          if not parsed.get("ok"):
              print(f"Slack API returned error for failure message: {parsed}")
          else:
              print("Slack failure notification sent.")
          PY
