name: TikTok Boost Manual

on:
  workflow_dispatch:
    inputs:
      video_link:
        description: TikTok video URL to boost (or numeric item_id)
        required: true
        type: string
      access_token:
        description: TikTok access token (recommended; overrides oauth_url if set)
        required: false
        default: ""
        type: string
      oauth_url:
        description: TikTok OAuth callback URL that contains auth_code/code (used only if access_token is empty)
        required: false
        default: ""
        type: string
      source_campaign_name:
        description: Exact campaign name to copy
        required: false
        default: acemate_Views_2026_03_12
        type: string
      date_tag:
        description: Optional date tag (YYYY_MM_DD). Leave empty for UTC today.
        required: false
        default: ""
        type: string
      spend_limit_eur:
        description: Auto-stop threshold in EUR for guard workflow
        required: false
        default: "10"
        type: string

permissions:
  contents: read
  actions: write

env:
  TIKTOK_BASE_URL: https://business-api.tiktok.com/open_api/v1.3
  TIKTOK_ADVERTISER_ID: "7441895227339718673"
  TIKTOK_APP_ID_DEFAULT: "7548665268394786817"
  MONITOR_VAR_NAME: TIKTOK_MONITOR_STATE

jobs:
  boost:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse OAuth URL
        id: oauth
        if: ${{ inputs.access_token == '' }}
        shell: bash
        env:
          INPUT_OAUTH_URL: ${{ inputs.oauth_url }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          import urllib.parse

          raw_input = os.environ["INPUT_OAUTH_URL"]
          default_app_id = os.environ.get("TIKTOK_APP_ID_DEFAULT", "")
          app_id_match = re.search(r"\d{8,}", str(default_app_id))
          app_id = app_id_match.group(0) if app_id_match else ""

          if not str(raw_input).strip():
              print("::error::oauth_url input is empty.")
              sys.exit(1)

          # Parse auth_code/code from any pasted shape (URL, callback snippet, or mixed text).
          decoded_input = urllib.parse.unquote(str(raw_input))
          code_match = re.search(
              r"(?:^|[?&#\s])(?:auth_code|code)=([A-Za-z0-9._-]+)",
              decoded_input,
          )
          auth_code = code_match.group(1) if code_match else ""
          if not auth_code:
              compact = re.sub(r"\s+", "", decoded_input).strip()
              if re.fullmatch(r"[A-Za-z0-9._-]{20,}", compact):
                  auth_code = compact

          if not app_id:
              print("::error::Invalid TIKTOK_APP_ID_DEFAULT.")
              sys.exit(1)

          if not auth_code:
              print("::error::No auth_code/code found. Paste the CALLBACK URL after authorization (or paste the raw code).")
              sys.exit(1)

          print(f"Resolved app_id={app_id}; auth_code_len={len(auth_code)}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"app_id={app_id}\n")
              fh.write(f"auth_code={auth_code}\n")
          PY

      - name: Use provided access token
        id: token_direct
        if: ${{ inputs.access_token != '' }}
        shell: bash
        env:
          INPUT_ACCESS_TOKEN: ${{ inputs.access_token }}
        run: |
          python - <<'PY'
          import os
          import sys

          access_token = str(os.environ.get("INPUT_ACCESS_TOKEN") or "").strip()
          if not access_token:
              print("::error::access_token input is empty.")
              sys.exit(1)

          print(f"::add-mask::{access_token}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"access_token={access_token}\n")
          print("Using access_token input directly.")
          PY

      - name: Exchange auth_code for access_token
        id: token
        if: ${{ inputs.access_token == '' }}
        shell: bash
        env:
          TIKTOK_APP_SECRET: ${{ secrets.TIKTOK_APP_SECRET }}
          OAUTH_APP_ID: ${{ steps.oauth.outputs.app_id }}
          OAUTH_AUTH_CODE: ${{ steps.oauth.outputs.auth_code }}
        run: |
          python - <<'PY'
          import json
          import os

          payload = {
              "app_id": os.environ["OAUTH_APP_ID"].strip(),
              "secret": os.environ["TIKTOK_APP_SECRET"].strip(),
              "auth_code": os.environ["OAUTH_AUTH_CODE"].strip(),
          }
          with open("token_request.json", "w", encoding="utf-8") as fh:
              json.dump(payload, fh)
          PY

          curl -sS -X POST "${TIKTOK_BASE_URL}/oauth2/access_token/" \
            -H "Content-Type: application/json" \
            --data @token_request.json > token_response.json

          python - <<'PY'
          import json
          import os
          import sys

          with open("token_response.json", "r", encoding="utf-8") as fh:
              data = json.load(fh)

          code = data.get("code")
          if code not in (0, "0"):
              message = str(data.get("message") or "")
              if code in (40110, "40110"):
                  print("::error::Token exchange failed: auth_code already used. Open the auth URL again and paste a fresh callback URL/code.")
              elif code in (40131, "40131"):
                  print("::error::Token exchange failed: auth_code expired. Re-authorize and paste a fresh callback URL/code immediately.")
              else:
                  print(f"::error::Token exchange failed: {message} | body={data}")
              sys.exit(1)

          access_token = str(((data.get("data") or {}).get("access_token") or "")).strip()
          if not access_token:
              print("::error::No access_token returned.")
              sys.exit(1)

          print(f"::add-mask::{access_token}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"access_token={access_token}\n")
          PY

      - name: Resolve final access token
        id: token_final
        shell: bash
        env:
          TOKEN_DIRECT: ${{ steps.token_direct.outputs.access_token }}
          TOKEN_EXCHANGED: ${{ steps.token.outputs.access_token }}
        run: |
          python - <<'PY'
          import os
          import sys

          token = str(os.environ.get("TOKEN_DIRECT") or "").strip()
          if not token:
              token = str(os.environ.get("TOKEN_EXCHANGED") or "").strip()
          if not token:
              print("::error::No access token available. Provide access_token input or a valid oauth_url callback.")
              sys.exit(1)

          print(f"::add-mask::{token}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"access_token={token}\n")
          PY

      - name: Resolve date tag
        id: date
        shell: bash
        env:
          INPUT_DATE_TAG: ${{ inputs.date_tag }}
        run: |
          if [ -n "${INPUT_DATE_TAG}" ]; then
            echo "date_tag=${INPUT_DATE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "date_tag=$(date -u +%Y_%m_%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run automation
        id: run_automation
        shell: bash
        env:
          TIKTOK_ACCESS_TOKEN: ${{ steps.token_final.outputs.access_token }}
          TIKTOK_ADVERTISER_ID: ${{ env.TIKTOK_ADVERTISER_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0A49B277UK
          INPUT_SOURCE_CAMPAIGN_NAME: ${{ inputs.source_campaign_name }}
          INPUT_VIDEO_LINK: ${{ inputs.video_link }}
          DATE_TAG: ${{ steps.date.outputs.date_tag }}
        run: |
          python automation.py \
            --source-campaign-name "${INPUT_SOURCE_CAMPAIGN_NAME}" \
            --latest-item-id "${INPUT_VIDEO_LINK}" \
            --date-tag "${DATE_TAG}" > run_result.json

          cat run_result.json

      - name: Parse run result
        id: result
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          with open("run_result.json", "r", encoding="utf-8") as fh:
              result = json.load(fh)

          if result.get("dry_run") is True:
              print("::error::Unexpected dry_run result in GitHub workflow.")
              sys.exit(1)

          campaign_id = str(result.get("new_campaign_id") or "").strip()
          campaign_name = str(result.get("new_campaign_name") or "").strip()
          if not campaign_id:
              print(f"::error::No new_campaign_id in run result: {result}")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"campaign_id={campaign_id}\n")
              fh.write(f"campaign_name={campaign_name}\n")
          PY

      - name: Save monitor state for hourly budget guard
        id: save_state
        shell: bash
        env:
          CAMPAIGN_ID: ${{ steps.result.outputs.campaign_id }}
          CAMPAIGN_NAME: ${{ steps.result.outputs.campaign_name }}
          TIKTOK_ACCESS_TOKEN: ${{ steps.token_final.outputs.access_token }}
          SPEND_LIMIT_EUR: ${{ inputs.spend_limit_eur }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os

          state = {
              "campaign_id": os.environ["CAMPAIGN_ID"],
              "campaign_name": os.environ["CAMPAIGN_NAME"],
              "advertiser_id": os.environ["TIKTOK_ADVERTISER_ID"],
              "access_token": os.environ["TIKTOK_ACCESS_TOKEN"],
              "started_at": dt.datetime.now(dt.timezone.utc).isoformat(),
              "spend_limit_eur": str(os.environ["SPEND_LIMIT_EUR"]),
          }
          with open("monitor_state.json", "w", encoding="utf-8") as fh:
              json.dump(state, fh, separators=(",", ":"))
          print(f"Stored monitor state artifact payload (campaign_id={state['campaign_id']}).")
          PY

      - name: Upload monitor state artifact
        id: upload_state
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-monitor-state
          path: monitor_state.json
          retention-days: 2

      - name: Send Slack error notification
        if: failure()
        continue-on-error: true
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: C0A49B277UK
          INPUT_VIDEO_LINK: ${{ inputs.video_link }}
          DATE_TAG: ${{ steps.date.outputs.date_tag }}
          OUTCOME_DIRECT_TOKEN: ${{ steps.token_direct.outcome }}
          OUTCOME_OAUTH: ${{ steps.oauth.outcome }}
          OUTCOME_TOKEN: ${{ steps.token.outcome }}
          OUTCOME_TOKEN_FINAL: ${{ steps.token_final.outcome }}
          OUTCOME_DATE: ${{ steps.date.outcome }}
          OUTCOME_RUN: ${{ steps.run_automation.outcome }}
          OUTCOME_RESULT: ${{ steps.result.outcome }}
          OUTCOME_SAVE: ${{ steps.save_state.outcome }}
          OUTCOME_UPLOAD: ${{ steps.upload_state.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ.get("SLACK_BOT_TOKEN", "").strip()
          if not token:
              print("SLACK_BOT_TOKEN not set; skipping failure Slack notification.")
              raise SystemExit(0)

          outcomes = [
              ("Use provided access token", os.environ.get("OUTCOME_DIRECT_TOKEN", "")),
              ("Parse OAuth URL", os.environ.get("OUTCOME_OAUTH", "")),
              ("Exchange auth_code for access_token", os.environ.get("OUTCOME_TOKEN", "")),
              ("Resolve final access token", os.environ.get("OUTCOME_TOKEN_FINAL", "")),
              ("Resolve date tag", os.environ.get("OUTCOME_DATE", "")),
              ("Run automation", os.environ.get("OUTCOME_RUN", "")),
              ("Parse run result", os.environ.get("OUTCOME_RESULT", "")),
              ("Save monitor state", os.environ.get("OUTCOME_SAVE", "")),
              ("Upload monitor state artifact", os.environ.get("OUTCOME_UPLOAD", "")),
          ]
          failed_step = next((name for name, outcome in outcomes if outcome == "failure"), "Unknown")

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          actor = os.environ.get("GITHUB_ACTOR", "")
          workflow = os.environ.get("GITHUB_WORKFLOW", "TikTok Boost Manual")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""

          text = (
              f":x: {workflow} failed\n"
              f"Failed step: {failed_step}\n"
              f"Video: {os.environ.get('INPUT_VIDEO_LINK', '')}\n"
              f"Date tag: {os.environ.get('DATE_TAG', '')}\n"
              f"Actor: {actor}\n"
              f"Run: {run_url}"
          )

          payload = {
              "channel": os.environ.get("SLACK_CHANNEL_ID", "C0A49B277UK"),
              "text": text,
              "unfurl_links": False,
              "unfurl_media": False,
          }
          req = urllib.request.Request(
              url="https://slack.com/api/chat.postMessage",
              method="POST",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8",
              },
          )
          try:
              raw = urllib.request.urlopen(req, timeout=20).read().decode("utf-8")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(f"Slack notification failed with HTTP {exc.code}: {body}")
              raise SystemExit(0)
          except urllib.error.URLError as exc:
              print(f"Slack notification network error: {exc}")
              raise SystemExit(0)

          result = json.loads(raw)
          if not result.get("ok"):
              print(f"Slack API returned error: {result}")
          else:
              print("Slack failure notification sent.")
          PY
